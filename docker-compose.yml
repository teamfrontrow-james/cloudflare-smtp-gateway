# Standalone run. Copy .env.example to .env and fill it in first.
#   docker compose up -d
services:
  cloudflare-smtp-gateway:
    image: ghcr.io/teamfrontrow-james/cloudflare-smtp-gateway:latest
    # Or build locally instead of pulling:
    # build: .
    restart: unless-stopped
    env_file: .env
    environment:
      BIND_HOST: 0.0.0.0
      DATA_DIR: /data
    ports:
      - "2525:2525"   # SMTP submission
      - "3000:3000"   # HTTP /send + admin UI
    volumes:
      - cmg-data:/data

volumes:
  cmg-data:
